    <header>
        <a id="top" hidden></a>
        <div class="appMenu" id="topMenu">
    
            <a id="iobtn" class="menuItem" onclick="showMenu()" >01</a>
    
            <div id="menuList" class="card" style="display: none">
            </div>
        </div>

        <div class="toolMenu" id="topMenu" style="position: fixed;">

            <a id="abtn" class="menuItem" onclick="showL()" >L|</a>

<body onload="oiMenu_load(), loadEditor(), insertBody(), versionID()">
    <center>
        <p>
            <img src="./img/icons/Luminary.svg" style="width: 50%; min-width: 250px; max-width: 500px;" alt=''>
        </p>
    </center>
    

    <section class="m-ide card">
        <div class="card-heading">
            <h1> <span id="versionID"></span></h1>
        </div>

        <section id="editor">

            <div class="m-container-editor">
                <div>
                        <textarea onkeyup="insertBody();" name="" id="textEditor" cols="50" rows="15" width="100%" placeholder='Say "Hello World!"'></textarea>


                        
                </div>
            </div>
            

        </section>

        <section id="viewport" contenteditable="true" onkeyup="updateBody();">
            <div class="container-viewport card">
                <p><div id="ide-menu">

                </div></p>
                <p><div id="ide-body">

                </div></p>
                <p><div id="ide-footer">

                </div></p>
            </div>
            

        </section>

    </section>
<div class="card-body">
    <p style="text-align: center;">
        <i>*Due to this stage of development, we do not advice using LuminaryIDE for critical development and advise manual saving of any projects (Tap the "L|" button).</i>
    </p>
</div>
